<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ShowroomPro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#0f1210; --panel:#171c19; --panel-2:#1e2420; --line:#2a322c;
    --amber:#e8a13d; --moss:#5f9270; --rust:#c2603f;
    --text:#eef0e8; --text-dim:#9aa39a;
    --mono:'Courier New', monospace;
    --sans:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  input,select,button,textarea{font-family:inherit;}
  .hidden{display:none !important;}

  /* ---- LOGIN ---- */
  #loginScreen{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; background:radial-gradient(ellipse at top, rgba(232,161,61,.08), transparent 60%), var(--ink);
  }
  .logo-mark{
    width:56px;height:56px;border:2px solid var(--amber);border-radius:12px;
    display:flex;align-items:center;justify-content:center;margin-bottom:20px;
    font-weight:700;font-size:20px;color:var(--amber);transform:rotate(-3deg);
  }
  #loginScreen h2{margin:0 0 4px;font-size:20px;}
  #loginScreen .sub{color:var(--text-dim);font-size:13px;margin-bottom:28px;}
  .field{width:100%;max-width:320px;margin-bottom:14px;}
  .field label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:6px;}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;}
  .btn-primary{width:100%;max-width:320px;background:var(--amber);color:#1a1305;border:none;padding:14px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-top:6px;}
  #loginError{color:var(--rust);font-size:12px;margin-top:10px;min-height:16px;}

  /* ---- APP SHELL ---- */
  #app{max-width:600px;margin:0 auto;padding-bottom:90px;}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px;position:sticky;top:0;background:var(--ink);z-index:10;border-bottom:1px solid var(--line);}
  header h1{font-size:17px;margin:0;}
  header .who{font-size:11px;color:var(--text-dim);font-family:var(--mono);}
  #logoutBtn{background:none;border:1px solid var(--line);color:var(--text-dim);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;}

  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px;}
  .stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:12px 10px;}
  .stat .n{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--amber);}
  .stat .l{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

  .search-row{padding:0 16px 10px;}
  .search-row input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;}
  .chip{font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);white-space:nowrap;color:var(--text-dim);cursor:pointer;background:none;}
  .chip.active{background:var(--amber);color:#1a1305;border-color:var(--amber);font-weight:700;}

  #vehicleList{padding:0 16px;}
  .vcard{display:flex;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;cursor:pointer;}
  .vthumb{width:64px;height:64px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#2a322c,#3a453d);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .vinfo{flex:1;min-width:0;}
  .vinfo .name{font-weight:700;font-size:14px;margin-bottom:2px;}
  .vinfo .meta{font-size:11px;color:var(--text-dim);margin-bottom:6px;}
  .vinfo .price{font-family:var(--mono);font-size:14px;color:var(--amber);font-weight:700;}
  .status-tag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:5px;align-self:flex-start;display:inline-block;margin-bottom:4px;}
  .status-intake{background:rgba(154,163,154,.18);color:var(--text-dim);}
  .status-listed{background:rgba(95,146,112,.18);color:var(--moss);}
  .status-reserved{background:rgba(232,161,61,.18);color:var(--amber);}
  .status-sold,.status-delivered{background:rgba(194,96,63,.18);color:var(--rust);}
  #emptyState{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;}

  .fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--amber);color:#1a1305;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;box-shadow:0 8px 20px -6px rgba(232,161,61,.5);border:none;cursor:pointer;z-index:20;}

  /* ---- MODAL ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .modal{background:var(--panel);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-head h2{font-size:16px;margin:0;}
  .modal-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .form-grid .full{grid-column:1 / -1;}
  .form-field label{display:block;font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:.06em;margin-bottom:4px;}
  .form-field input,.form-field select,.form-field textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:9px 10px;color:var(--text);font-size:13px;}
  .modal-actions{display:flex;gap:8px;margin-top:10px;}
  .btn-secondary{flex:1;background:transparent;border:1px solid var(--line);color:var(--text);padding:12px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;}
  .btn-amber{flex:1;background:var(--amber);color:#1a1305;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}
  .modal-error{color:var(--rust);font-size:12px;margin:8px 0;min-height:14px;}

  .stage-track{display:flex;align-items:center;margin:16px 0;}
  .stage-dot{width:10px;height:10px;border-radius:50%;background:var(--line);flex-shrink:0;}
  .stage-dot.done{background:var(--moss);}
  .stage-dot.current{background:var(--amber);box-shadow:0 0 0 4px rgba(232,161,61,.2);}
  .stage-line{flex:1;height:2px;background:var(--line);}
  .stage-line.done{background:var(--moss);}

  .leads-list{margin-top:14px;}
  .lead-card{background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:8px;padding:10px;margin-bottom:8px;}
  .lead-top{display:flex;justify-content:space-between;margin-bottom:3px;}
  .lead-top .name{font-weight:700;font-size:13px;}
  .lead-top .status{font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--amber);}
  .lead-veh{font-size:11px;color:var(--text-dim);}
  .lead-contact-row{display:flex;gap:6px;margin-top:8px;}
  .lead-contact-btn{flex:1;text-align:center;text-decoration:none;font-size:11px;font-weight:600;padding:7px;border-radius:6px;border:1px solid var(--line);}
  .lead-contact-btn.call{color:var(--amber);border-color:var(--amber);}
  .lead-contact-btn.wa{color:var(--moss);border-color:var(--moss);}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--line);padding:10px 18px;border-radius:20px;font-size:12px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;}
  #toast.show{opacity:1;}

  .dash-stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
  .dash-stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px 12px;}
  .dash-stat .n{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--amber);}
  .dash-stat .l{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .dash-section{margin-bottom:18px;}
  .dash-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin:0 0 10px;font-family:var(--mono);}
  .leaderboard-row{display:flex;justify-content:space-between;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
  .leaderboard-row .rank{font-family:var(--mono);color:var(--amber);font-weight:700;margin-right:8px;}
  .leaderboard-row .lname{font-size:13px;font-weight:600;}
  .leaderboard-row .lstats{font-size:11px;color:var(--text-dim);}
  .source-bar-row{margin-bottom:10px;}
  .source-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .source-bar-track{background:var(--panel-2);border-radius:6px;height:8px;overflow:hidden;}
  .source-bar-fill{background:var(--moss);height:100%;border-radius:6px;}

  .import-drop{border:2px dashed var(--line);border-radius:10px;padding:24px;text-align:center;cursor:pointer;margin-bottom:14px;}
  .import-drop.dragover{border-color:var(--amber);background:rgba(232,161,61,.06);}
  .import-drop p{margin:0;font-size:12px;color:var(--text-dim);}
  .preview-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px;}
  .preview-table th{text-align:left;font-family:var(--mono);text-transform:uppercase;font-size:9px;color:var(--text-dim);padding:6px 8px;border-bottom:1px solid var(--line);}
  .preview-table td{padding:6px 8px;border-bottom:1px solid var(--line);}
  .preview-table tr.row-skip td{color:var(--text-dim);text-decoration:line-through;}
  .preview-summary{display:flex;gap:16px;font-size:12px;margin-bottom:12px;}
  .preview-summary span.ok{color:var(--moss);}
  .preview-summary span.skip{color:var(--rust);}

  .report-table{width:100%;border-collapse:collapse;font-size:11px;}
  .report-table th{text-align:left;font-family:var(--mono);text-transform:uppercase;font-size:9px;color:var(--text-dim);padding:8px 6px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);}
  .report-table td{padding:7px 6px;border-bottom:1px solid var(--line);}
  .report-controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .report-controls select{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:8px 10px;color:var(--text);font-size:12px;}

  @media print {
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;top:0;left:0;width:100%;padding:20px;color:#000;background:#fff;}
    #printArea .report-table th, #printArea .report-table td{border-color:#ccc;color:#000;}
    #printArea .report-table th{background:#fff;}
  }

  /* ---- PHOTO GRID (in vehicle detail) ---- */
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0;}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--panel-2);cursor:pointer;}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;}
  .photo-thumb .photo-del{position:absolute;top:3px;right:3px;background:rgba(15,18,16,.75);color:var(--rust);border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;}
  .photo-add-tile{aspect-ratio:1;border:2px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text-dim);cursor:pointer;}

  /* ---- LIGHTBOX ---- */
  .lightbox-overlay{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;}
  .lightbox-top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;color:#fff;}
  .lightbox-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}
  .lightbox-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .lightbox-stage img{max-width:100%;max-height:100%;object-fit:contain;}
  .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;}
  .lightbox-nav.prev{left:10px;}
  .lightbox-nav.next{right:10px;}
  .lightbox-caption{padding:14px 20px 24px;color:#fff;text-align:center;font-size:13px;background:linear-gradient(0deg, rgba(0,0,0,.6), transparent);}
  .lightbox-caption input{width:100%;max-width:400px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:8px 10px;color:#fff;font-size:12px;text-align:center;margin-top:6px;}
  .lightbox-dots{display:flex;gap:6px;justify-content:center;padding-bottom:10px;}
  .lightbox-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);}
  .lightbox-dot.active{background:var(--amber);}

  /* ---- SHARE VIEW (public, no login, no dark theme dependency) ---- */
  .share-page{max-width:600px;margin:0 auto;background:var(--ink);min-height:100vh;color:var(--text);}
  .share-hero{aspect-ratio:4/3;background:var(--panel-2);position:relative;}
  .share-hero img{width:100%;height:100%;object-fit:cover;}
  .share-hero-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;}
  .share-hero-nav.prev{left:10px;}
  .share-hero-nav.next{right:10px;}
  .share-thumbs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;}
  .share-thumbs img{width:56px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;opacity:.5;cursor:pointer;}
  .share-thumbs img.active{opacity:1;outline:2px solid var(--amber);}
  .share-body{padding:20px;}
  .share-body h1{font-size:22px;margin:0 0 4px;}
  .share-body .meta{color:var(--text-dim);font-size:13px;margin-bottom:12px;}
  .share-body .price{font-family:var(--mono);font-size:28px;color:var(--amber);font-weight:700;margin-bottom:20px;}
  .share-caption{font-size:12px;color:var(--text-dim);padding:8px 16px;font-style:italic;}
  .share-error{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;color:var(--text-dim);}
</style>
</head>
<body>

<!-- PUBLIC SHARE VIEW (no login) -->
<div id="shareScreen" class="hidden"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-mark">SP</div>
  <h2>ShowroomPro</h2>
  <div class="sub">Sign in to manage stock</div>
  <div class="field"><label>Username</label><input id="loginUsername" placeholder="e.g. arun"></div>
  <div class="field"><label>PIN</label><input id="loginPin" type="password" placeholder="••••"></div>
  <button class="btn-primary" onclick="doLogin()">Sign In</button>
  <div id="loginError"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div>
      <h1>Stock Floor</h1>
      <div class="who" id="whoami"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="dashboardBtn" onclick="openDashboardModal()" style="background:none;border:1px solid var(--line);color:var(--amber);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;">📊 Dashboard</button>
      <button id="bulkImportBtn" onclick="openBulkImportModal()" class="hidden" style="background:none;border:1px solid var(--line);color:var(--amber);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;">⬆ Import</button>
      <button id="reportsBtn" onclick="openReportsModal()" class="hidden" style="background:none;border:1px solid var(--line);color:var(--amber);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;">🖨 Reports</button>
      <button id="logoutBtn" onclick="doLogout()">Log out</button>
    </div>
  </header>

  <div class="stat-row">
    <div class="stat"><div class="n" id="statTotal">0</div><div class="l">In Stock</div></div>
    <div class="stat"><div class="n" id="statReserved">0</div><div class="l">Reserved</div></div>
    <div class="stat"><div class="n" id="statValue">₹0</div><div class="l">Stock Value</div></div>
  </div>

  <div class="search-row"><input id="searchBox" placeholder="Search make, model, reg no..." oninput="renderList()"></div>

  <div class="chips" id="filterChips">
    <button class="chip active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="chip" data-filter="listed" onclick="setFilter('listed')">Listed</button>
    <button class="chip" data-filter="reserved" onclick="setFilter('reserved')">Reserved</button>
    <button class="chip" data-filter="sold" onclick="setFilter('sold')">Sold</button>
  </div>

  <div id="vehicleList"></div>
  <div id="emptyState" class="hidden">No vehicles match this view.</div>

  <button class="fab" onclick="openAddModal()">+</button>
</div>

<div id="toast"></div>

<script>
// ============ CONFIG ============
// Paste your Apps Script Web App URL here after deployment.
const GAS_URL = 'https://script.google.com/macros/s/AKfycbza5tSUEkwkxY9XvbVF3URQCap21X4Cofhbia2BOYZTjkb3lEgLzlkbyz-kPa0q1nIa/exec';

// ============ STATE ============
let session = null; // {username, fullName, role}
let vehicles = [];
let currentFilter = 'all';
let lists = {};

// ============ INIT ============
window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const shareId = urlParams.get('share');
  if (shareId) {
    loadShareView(shareId);
    return;
  }

  const saved = localStorage.getItem('showroompro_session');
  if (saved) {
    session = JSON.parse(saved);
    showApp();
  }
});

// ============ API HELPER ============
async function api(action, params, method) {
  method = method || 'GET';
  if (method === 'GET') {
    const query = Object.assign({ action: action }, params || {});
    const qs = Object.keys(query).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(query[k] ?? '')).join('&');
    const res = await fetch(GAS_URL + '?' + qs);
    return res.json();
  } else {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action }, params || {}))
    });
    return res.json();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============ LOGIN ============
async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (!username || !pin) { errEl.textContent = 'Enter username and PIN'; return; }

  try {
    const result = await api('login', { username: username, pin: pin });
    if (!result.success) { errEl.textContent = result.error || 'Login failed'; return; }
    session = { username: result.username, fullName: result.fullName, role: result.role };
    localStorage.setItem('showroompro_session', JSON.stringify(session));
    showApp();
  } catch (e) {
    errEl.textContent = 'Connection error — check GAS_URL is set';
  }
}

function doLogout() {
  localStorage.removeItem('showroompro_session');
  session = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

async function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('whoami').textContent = session.fullName + ' · ' + session.role;
  const roleLower = String(session.role).toLowerCase();
  if (roleLower === 'admin') {
    document.getElementById('bulkImportBtn').classList.remove('hidden');
  }
  if (roleLower === 'admin' || roleLower === 'manager') {
    document.getElementById('reportsBtn').classList.remove('hidden');
  }
  await loadLists();
  await loadVehicles();
}

// ============ DATA LOAD ============
async function loadLists() {
  try {
    const result = await api('getLists');
    if (result.success) lists = result.lists;
  } catch (e) { /* non-fatal */ }
}

async function loadVehicles() {
  try {
    const result = await api('getVehicles');
    if (result.success) {
      vehicles = result.vehicles;
      renderStats();
      renderList();
    }
  } catch (e) {
    showToast('Could not load stock — check connection');
  }
}

// ============ FILTER / RENDER ============
function matchesFilter(v, filterKey) {
  if (filterKey === 'all') return v.Status !== 'delivered';
  return v.Status === filterKey;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  renderList();
}

function renderStats() {
  const active = vehicles.filter(v => v.Status !== 'delivered' && v.Status !== 'sold');
  const reserved = vehicles.filter(v => v.Status === 'reserved');
  const totalValue = active.reduce((sum, v) => sum + (Number(v.ListedPrice) || 0), 0);

  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statReserved').textContent = reserved.length;
  document.getElementById('statValue').textContent = '₹' + totalValue.toLocaleString('en-IN');
}

function renderList() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const listEl = document.getElementById('vehicleList');
  const emptyEl = document.getElementById('emptyState');

  let filtered = vehicles.filter(v => matchesFilter(v, currentFilter));
  if (search) {
    filtered = filtered.filter(v =>
      (v.Make + ' ' + v.Model + ' ' + v.RegNo).toLowerCase().includes(search)
    );
  }

  if (filtered.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  listEl.innerHTML = filtered.map(v => {
    const price = session.role === 'Sales' ? v.ListedPrice : (v.ListedPrice || v.PurchasePrice);
    return `
      <div class="vcard" onclick="openDetailModal('${v.VehicleID}')">
        <div class="vthumb">🏍️</div>
        <div class="vinfo">
          <span class="status-tag status-${v.Status}">${v.Status}</span>
          <div class="name">${escapeHtml(v.Make)} ${escapeHtml(v.Model)}</div>
          <div class="meta">${v.Year || ''} · ${v.KMDriven ? Number(v.KMDriven).toLocaleString('en-IN') + ' km' : ''} · ${escapeHtml(v.RegNo || '')}</div>
          <div class="price">₹${Number(price || 0).toLocaleString('en-IN')}</div>
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const STAGES = ['intake', 'listed', 'reserved', 'sold', 'delivered'];

async function openDetailModal(vehicleId) {
  const v = vehicles.find(x => String(x.VehicleID) === String(vehicleId));
  if (!v) return;

  const currentIdx = STAGES.indexOf(v.Status);
  const trackHtml = STAGES.map((s, i) => {
    const dotClass = i < currentIdx ? 'done' : (i === currentIdx ? 'current' : '');
    const lineClass = i < currentIdx ? 'done' : '';
    return `<div class="stage-dot ${dotClass}"></div>` + (i < STAGES.length - 1 ? `<div class="stage-line ${lineClass}"></div>` : '');
  }).join('');

  const canSeeCost = session.role !== 'Sales';
  const canShare = String(session.role).toLowerCase() === 'admin' || String(session.role).toLowerCase() === 'manager';
  const canEdit = canShare; // Manager or Admin
  const priceInfo = canSeeCost && v.PurchasePrice
    ? `<div class="form-field"><label>Purchase Price</label><div style="font-size:13px;padding-top:8px;">₹${Number(v.PurchasePrice).toLocaleString('en-IN')}</div></div>`
    : '';

  let actionHtml = '';
  if (v.Status === 'intake') {
    actionHtml = `<button class="btn-amber" style="width:100%" onclick="doListVehicle('${vehicleId}')">List Vehicle</button>`;
  } else if (v.Status === 'listed') {
    actionHtml = `<button class="btn-amber" style="width:100%" onclick="doReserve('${vehicleId}')">Reserve</button>`;
  } else if (v.Status === 'reserved') {
    actionHtml = `<button class="btn-amber" style="width:100%" onclick="openSoldForm('${vehicleId}')">Mark Sold</button>`;
  } else if (v.Status === 'sold') {
    actionHtml = `<button class="btn-amber" style="width:100%" onclick="doDeliver('${vehicleId}')">Mark Delivered</button>`;
  }

  const html = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-head">
          <h2>${escapeHtml(v.Make)} ${escapeHtml(v.Model)}</h2>
          <div style="display:flex;gap:10px;align-items:center;">

          <div class="form-field"><label>KM Driven</label><div style="font-size:13px;padding-top:4px;">${v.KMDriven || '—'}</div></div>
          <div class="form-field"><label>Source</label><div style="font-size:13px;padding-top:4px;">${v.Source || '—'}</div></div>

// ============ BULK IMPORT MODAL ============
let parsedImportRows = [];

function openBulkImportModal() {
  const html = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-head"><h2>Bulk Import Stock</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="import-drop" id="importDrop" onclick="document.getElementById('importFile').click()">
          <p>Tap to choose an Excel or CSV file<br>Columns expected: RegNo, Make, Model, Year, KMDriven, PurchasePrice, ListedPrice, Source</p>
          <input type="file" id="importFile" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleImportFile(event)">
        </div>
        <div id="importPreviewArea"></div>
        <div class="modal-error" id="importError"></div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-amber" id="importSubmitBtn" onclick="submitBulkImport()" disabled>Import Vehicles</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheetName = workbook.SheetNames[0];
      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: '' });
      parsedImportRows = normalizeImportRows(rows);
      renderImportPreview();
    } catch (err) {
      document.getElementById('importError').textContent = 'Could not read file — check it is a valid Excel/CSV';
    }
  };
  reader.readAsArrayBuffer(file);
}

function normalizeImportRows(rows) {
  // Case-insensitive header matching so "reg no", "RegNo", "Reg. No" style variance still works
  const fieldAliases = {
    RegNo: ['regno', 'reg no', 'reg. no', 'registration', 'registration no'],
    Make: ['make', 'brand'],
    Model: ['model'],
    Year: ['year', 'yr'],
    KMDriven: ['kmdriven', 'km driven', 'km', 'kilometers'],
    PurchasePrice: ['purchaseprice', 'purchase price', 'cost'],
    ListedPrice: ['listedprice', 'listed price', 'price', 'asking price'],
    Source: ['source']
  };

  return rows.map(row => {
    const normalized = {};
    const rowKeysLower = {};
    Object.keys(row).forEach(k => { rowKeysLower[k.toLowerCase().trim()] = row[k]; });

    Object.keys(fieldAliases).forEach(field => {
      const alias = fieldAliases[field].find(a => rowKeysLower[a] !== undefined);
      normalized[field] = alias ? rowKeysLower[alias] : '';
    });
    return normalized;
  });
}

function renderImportPreview() {
  const existingRegNos = new Set(
    vehicles.filter(v => v.Status !== 'delivered').map(v => String(v.RegNo).toUpperCase())
  );
  const seenInFile = new Set();

  let okCount = 0, skipCount = 0;
  const rowsHtml = parsedImportRows.map(r => {
    const regNo = String(r.RegNo || '').toUpperCase().trim();
    let skip = false, reason = '';
    if (!regNo || !r.Make || !r.Model) { skip = true; reason = 'missing required field'; }
    else if (existingRegNos.has(regNo)) { skip = true; reason = 'already in stock'; }
    else if (seenInFile.has(regNo)) { skip = true; reason = 'duplicate in file'; }

    if (skip) skipCount++; else { okCount++; seenInFile.add(regNo); }

    return `<tr class="${skip ? 'row-skip' : ''}">
      <td>${escapeHtml(regNo || '—')}</td>
      <td>${escapeHtml(r.Make)}</td>
      <td>${escapeHtml(r.Model)}</td>
      <td>${escapeHtml(r.ListedPrice)}</td>
      <td>${skip ? reason : 'ready'}</td>
    </tr>`;
  }).join('');

  const area = document.getElementById('importPreviewArea');
  area.innerHTML = `
    <div class="preview-summary"><span class="ok">${okCount} ready to import</span><span class="skip">${skipCount} skipped</span></div>
    <div style="max-height:220px;overflow-y:auto;">
      <table class="preview-table">
        <thead><tr><th>Reg No</th><th>Make</th><th>Model</th><th>Price</th><th>Status</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;

  document.getElementById('importSubmitBtn').disabled = okCount === 0;
}

async function submitBulkImport() {
  const errEl = document.getElementById('importError');
  const existingRegNos = new Set(
    vehicles.filter(v => v.Status !== 'delivered').map(v => String(v.RegNo).toUpperCase())
  );
  const seenInFile = new Set();

  const toImport = parsedImportRows.filter(r => {
    const regNo = String(r.RegNo || '').toUpperCase().trim();
    if (!regNo || !r.Make || !r.Model) return false;
    if (existingRegNos.has(regNo) || seenInFile.has(regNo)) return false;
    seenInFile.add(regNo);
    return true;
  }).map(r => ({
    RegNo: String(r.RegNo).toUpperCase().trim(),
    Make: r.Make,
    Model: r.Model,
    Year: r.Year,
    KMDriven: r.KMDriven,
    PurchasePrice: r.PurchasePrice,
    ListedPrice: r.ListedPrice,
    Source: r.Source
  }));

  if (toImport.length === 0) { errEl.textContent = 'Nothing to import'; return; }

  document.getElementById('importSubmitBtn').disabled = true;
  document.getElementById('importSubmitBtn').textContent = 'Importing...';

  try {
    const result = await api('importVehicles', { vehicles: toImport, username: session.username }, 'POST');
    if (!result.success) { errEl.textContent = result.error; return; }
    closeModal();
    showToast(`Imported ${result.added} vehicles${result.skipped.length ? ', ' + result.skipped.length + ' skipped' : ''}`);
    await loadVehicles();
  } catch (e) {
    errEl.textContent = 'Connection error during import';
  }
}

// ============ REPORTS MODAL ============
function openReportsModal() {
  const html = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" style="max-width:800px;">
        <div class="modal-head"><h2>Stock Report</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="report-controls">
          <select id="reportStatusFilter" onchange="renderReportTable()">
            <option value="all">All statuses</option>
            <option value="intake">Intake</option>
            <option value="listed">Listed</option>
            <option value="reserved">Reserved</option>
            <option value="sold">Sold</option>
            <option value="delivered">Delivered</option>
          </select>
          <button class="btn-secondary" style="flex:none;padding:8px 14px;" onclick="exportReportCSV()">⬇ Export CSV</button>
          <button class="btn-amber" style="flex:none;padding:8px 14px;" onclick="printReport()">🖨 Print</button>
        </div>
        <div id="printArea" style="max-height:400px;overflow-y:auto;">
          <table class="report-table" id="reportTable"></table>
        </div>
        ${String(session.role).toLowerCase() === 'admin' ? `
        <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px;">
          <button class="btn-secondary" style="width:auto;padding:8px 14px;font-size:11px;" onclick="checkPhotoFolder()">📁 Check Photo Storage</button>
          <div id="photoFolderInfo" style="font-size:11px;color:var(--text-dim);margin-top:8px;"></div>
        </div>` : ''}
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  renderReportTable();
}

async function checkPhotoFolder() {
  const infoEl = document.getElementById('photoFolderInfo');
  infoEl.textContent = 'Checking...';
  try {
    const result = await api('getPhotoFolderInfo', { username: session.username });
    if (result.success) {
      infoEl.innerHTML = `Folder "${escapeHtml(result.folderName)}" is ready. <a href="${result.folderUrl}" target="_blank" style="color:var(--amber);">Open in Drive ↗</a>`;
    } else {
      infoEl.textContent = 'Error: ' + result.error;
    }
  } catch (e) {
    infoEl.textContent = 'Connection error checking folder';
  }
}

function getReportRows() {
  const filter = document.getElementById('reportStatusFilter')?.value || 'all';
  return vehicles.filter(v => filter === 'all' || v.Status === filter);
}

function renderReportTable() {
  const rows = getReportRows();
  const canSeeCost = session.role.toLowerCase() !== 'sales';

  const costHeader = canSeeCost ? '<th>Purchase ₹</th>' : '';
  const listedHeader = '<th>Listed ₹</th>';

  const bodyRows = rows.map(v => `
    <tr>
      <td>${escapeHtml(v.RegNo)}</td>
      <td>${escapeHtml(v.Make)} ${escapeHtml(v.Model)}</td>
      <td>${v.Year || '—'}</td>
      <td>${v.KMDriven || '—'}</td>
      ${canSeeCost ? `<td>${v.PurchasePrice ? Number(v.PurchasePrice).toLocaleString('en-IN') : '—'}</td>` : ''}
      <td>${v.ListedPrice ? Number(v.ListedPrice).toLocaleString('en-IN') : '—'}</td>
      <td>${escapeHtml(v.Status)}</td>
      <td>${escapeHtml(v.Source || '—')}</td>
    </tr>`).join('');

  document.getElementById('reportTable').innerHTML = `
    <thead><tr><th>Reg No</th><th>Vehicle</th><th>Year</th><th>KM</th>${costHeader}${listedHeader}<th>Status</th><th>Source</th></tr></thead>
    <tbody>${bodyRows || '<tr><td colspan="8" style="color:var(--text-dim);">No vehicles match this filter</td></tr>'}</tbody>`;
}

function printReport() {
  window.print();
}

function exportReportCSV() {
  const rows = getReportRows();
  const canSeeCost = session.role.toLowerCase() !== 'sales';

  const headers = ['RegNo', 'Make', 'Model', 'Year', 'KMDriven'];
  if (canSeeCost) headers.push('PurchasePrice');
  headers.push('ListedPrice', 'Status', 'Source', 'SoldPrice', 'BuyerName', 'BuyerPhone');

  const csvRows = [headers.join(',')];
  rows.forEach(v => {
    const line = [v.RegNo, v.Make, v.Model, v.Year, v.KMDriven];
    if (canSeeCost) line.push(v.PurchasePrice);
    line.push(v.ListedPrice, v.Status, v.Source, v.SoldPrice, v.BuyerName, v.BuyerPhone);
    csvRows.push(line.map(f => `"${String(f ?? '').replace(/"/g, '""')}"`).join(','));
  });

  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'showroompro-stock-' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ============ PHOTOS (internal, in vehicle detail) ============
let currentPhotoVehicleId = null;
let currentPhotos = [];
let lightboxIndex = 0;

async function loadPhotoGrid(vehicleId) {
  currentPhotoVehicleId = vehicleId;
  try {
    const result = await api('getPhotos', { vehicleId: vehicleId });
    currentPhotos = result.success ? result.photos : [];
  } catch (e) {
    currentPhotos = [];
  }
  renderPhotoGrid();
}

function renderPhotoGrid() {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;
  const thumbsHtml = currentPhotos.map((p, i) => `
    <div class="photo-thumb" onclick="openLightbox(${i})">
      <img src="${p.url}" loading="lazy">
      <button class="photo-del" onclick="event.stopPropagation(); doDeletePhoto('${p.photoId}')">✕</button>
    </div>`).join('');
  grid.innerHTML = thumbsHtml + `<div class="photo-add-tile" onclick="document.getElementById('photoFileInput').click()">+</div>`;
}

async function handlePhotoUpload(event, vehicleId) {
  const files = Array.from(event.target.files || []);
  if (!files.length) return;
  showToast('Uploading ' + files.length + ' photo(s)...');

  let successCount = 0;
  const errors = [];
  for (const file of files) {
    try {
      const base64 = await fileToBase64(file);
      const result = await api('uploadPhoto', {
        vehicleId: vehicleId,
        base64Data: base64,
        mimeType: file.type,
        fileName: file.name,
        username: session.username
      }, 'POST');
      if (result.success) successCount++;
      else errors.push(file.name + ': ' + (result.error || 'unknown error'));
    } catch (e) {
      errors.push(file.name + ': connection error');
    }
  }
  event.target.value = '';
  if (errors.length) {
    showToast(successCount + ' uploaded, ' + errors.length + ' failed — ' + errors[0]);
  } else {
    showToast('Photos uploaded');
  }
  await loadPhotoGrid(vehicleId);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function doDeletePhoto(photoId) {
  if (!confirm('Delete this photo?')) return;
  const result = await api('deletePhoto', { photoId: photoId });
  if (result.success) { showToast('Photo deleted'); await loadPhotoGrid(currentPhotoVehicleId); }
  else showToast(result.error);
}

// ---- Lightbox ----
function openLightbox(index) {
  lightboxIndex = index;
  renderLightbox();
}

function renderLightbox() {
  const existing = document.getElementById('lightboxOverlay');
  if (existing) existing.remove();

  const photo = currentPhotos[lightboxIndex];
  if (!photo) return;

  const dotsHtml = currentPhotos.map((p, i) => `<div class="lightbox-dot ${i === lightboxIndex ? 'active' : ''}"></div>`).join('');
  const navHtml = currentPhotos.length > 1
    ? `<button class="lightbox-nav prev" onclick="lightboxStep(-1)">‹</button><button class="lightbox-nav next" onclick="lightboxStep(1)">›</button>`
    : '';

  const html = `
    <div class="lightbox-overlay" id="lightboxOverlay">
      <div class="lightbox-top">
        <span>${lightboxIndex + 1} / ${currentPhotos.length}</span>
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      </div>
      <div class="lightbox-stage">
        ${navHtml}
        <img src="${photo.url}">
      </div>
      <div class="lightbox-caption">
        <input id="lightboxCaptionInput" placeholder="Add a comment (optional)" value="${escapeHtml(photo.caption || '')}" onchange="saveLightboxCaption()">
      </div>
      <div class="lightbox-dots">${dotsHtml}</div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function lightboxStep(dir) {
  let next = lightboxIndex + dir;
  if (next < 0) next = currentPhotos.length - 1;
  if (next >= currentPhotos.length) next = 0;
  lightboxIndex = next;
  renderLightbox();
}

async function saveLightboxCaption() {
  const val = document.getElementById('lightboxCaptionInput').value.trim();
  const photo = currentPhotos[lightboxIndex];
  photo.caption = val;
  await api('updatePhotoCaption', { photoId: photo.photoId, caption: val });
}

function closeLightbox() {
  const el = document.getElementById('lightboxOverlay');
  if (el) el.remove();
  renderPhotoGrid();
}

// ============ SHARE LINK MODAL (internal) ============
async function openShareModal(vehicleId) {
  closeModal();
  const v = vehicles.find(x => String(x.VehicleID) === String(vehicleId));
  if (!v) { showToast('Vehicle not found — refreshing stock list'); await loadVehicles(); return; }

  let existingLinks = [];
  try {
    const result = await api('getShareLinks', { vehicleId: vehicleId });
    if (result.success) existingLinks = result.links.filter(l => String(l.IsRevoked).toUpperCase() !== 'TRUE');
  } catch (e) { /* non-fatal */ }

  const today = new Date();
  const defaultExpiry = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
  const defaultExpiryStr = defaultExpiry.toISOString().slice(0, 10);
  const minDateStr = today.toISOString().slice(0, 10);

  const linksHtml = existingLinks.length
    ? existingLinks.map(l => {
        const shareUrl = window.location.origin + window.location.pathname + '?share=' + l.ShareID;
        const waText = encodeURIComponent(`Hi! Here's the vehicle you enquired about: ${shareUrl}`);
        return `
          <div class="lead-card">
            <div class="lead-top"><span class="name">Expires ${escapeHtml(l.ExpiryDate)}</span>
              <span class="status" style="cursor:pointer;color:var(--rust);" onclick="doRevokeShare('${l.ShareID}', '${vehicleId}')">Revoke</span>
            </div>
            <div class="lead-veh" style="word-break:break-all;">${shareUrl}</div>
            <div style="display:flex;gap:6px;margin-top:6px;">
              <button class="btn-secondary" style="padding:6px;font-size:11px;" onclick="copyShareLink('${shareUrl}')">Copy Link</button>
              <a href="https://wa.me/?text=${waText}" target="_blank" style="flex:1;text-decoration:none;">
                <button class="btn-secondary" style="width:100%;padding:6px;font-size:11px;color:var(--moss);border-color:var(--moss);">📱 WhatsApp</button>
              </a>
            </div>
          </div>`;
      }).join('')
    : '<div style="color:var(--text-dim);font-size:12px;">No active share links yet.</div>';

  const html = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-head"><h2>Share · ${escapeHtml(v.Make)} ${escapeHtml(v.Model)}</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">Anyone with this link can view this vehicle's photos and price, no login needed. Choose how long the link stays active.</div>
        <div class="form-field" style="margin-bottom:14px;">
          <label>Link visible until</label>
          <input type="date" id="shareExpiryInput" value="${defaultExpiryStr}" min="${minDateStr}">
        </div>
        <div class="modal-error" id="shareError"></div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Close</button>
          <button class="btn-amber" onclick="submitShareLink('${vehicleId}')">Create Link</button>
        </div>
        <div class="leads-list" style="margin-top:16px;">${linksHtml}</div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function submitShareLink(vehicleId) {
  const errEl = document.getElementById('shareError');
  const expiryDate = document.getElementById('shareExpiryInput').value;
  if (!expiryDate) { errEl.textContent = 'Pick an expiry date'; return; }

  const result = await api('createShareLink', { vehicleId: vehicleId, expiryDate: expiryDate, username: session.username });
  if (!result.success) { errEl.textContent = result.error; return; }

  const shareUrl = window.location.origin + window.location.pathname + '?share=' + result.shareId;
  showToast('Share link created');
  copyShareLink(shareUrl);
  openShareModal(vehicleId);
}

async function doRevokeShare(shareId, vehicleId) {
  if (!confirm('Revoke this link? It will stop working immediately.')) return;
  try {
    const result = await api('revokeShareLink', { shareId: shareId, username: session.username });
    if (result.success) { showToast('Link revoked'); openShareModal(vehicleId); }
    else showToast('Revoke failed: ' + (result.error || 'unknown error'));
  } catch (e) {
    showToast('Revoke failed: connection error');
  }
}

function copyShareLink(url) {
  navigator.clipboard.writeText(url).then(
    () => showToast('Link copied to clipboard'),
    () => showToast('Could not copy — long-press to copy manually')
  );
}

// ============ PUBLIC SHARE VIEW ============
let shareViewPhotos = [];
let shareViewIndex = 0;

async function loadShareView(shareId) {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('shareScreen').classList.remove('hidden');
  document.getElementById('shareScreen').innerHTML = '<div class="share-error">Loading...</div>';

  try {
    const res = await fetch(GAS_URL + '?action=getSharedVehicle&shareId=' + encodeURIComponent(shareId));
    const result = await res.json();
    if (!result.success) {
      document.getElementById('shareScreen').innerHTML = `<div class="share-error">${escapeHtml(result.error)}</div>`;
      return;
    }
    renderShareView(result.vehicle, result.photos);
  } catch (e) {
    document.getElementById('shareScreen').innerHTML = '<div class="share-error">Could not load this link — check your connection.</div>';
  }
}

function renderShareView(vehicle, photos) {
  shareViewPhotos = photos;
  shareViewIndex = 0;

  const thumbsHtml = photos.map((p, i) =>
    `<img src="${p.url}" class="${i === 0 ? 'active' : ''}" onclick="setShareHero(${i})" data-idx="${i}">`
  ).join('');

  const heroNavHtml = photos.length > 1
    ? `<button class="share-hero-nav prev" onclick="shareHeroStep(-1)">‹</button><button class="share-hero-nav next" onclick="shareHeroStep(1)">›</button>`
    : '';

  const html = `
    <div class="share-page">
      <div class="share-hero">
        ${photos.length ? `<img id="shareHeroImg" src="${photos[0].url}">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);">No photos yet</div>'}
        ${heroNavHtml}
      </div>
      ${photos.length ? `<div class="share-caption" id="shareCaption">${escapeHtml(photos[0].caption || '')}</div>` : ''}
      ${photos.length > 1 ? `<div class="share-thumbs" id="shareThumbs">${thumbsHtml}</div>` : ''}
      <div class="share-body">
        <h1>${escapeHtml(vehicle.Make)} ${escapeHtml(vehicle.Model)}</h1>
        <div class="meta">${vehicle.Year || ''} · ${vehicle.KMDriven ? Number(vehicle.KMDriven).toLocaleString('en-IN') + ' km' : ''}</div>
        <div class="price">₹${Number(vehicle.ListedPrice || 0).toLocaleString('en-IN')}</div>
        <div style="font-size:12px;color:var(--text-dim);">Interested? Reply to the message this link was shared in, or contact the showroom directly.</div>
      </div>
    </div>`;
  document.getElementById('shareScreen').innerHTML = html;
}

function setShareHero(idx) {
  shareViewIndex = idx;
  document.getElementById('shareHeroImg').src = shareViewPhotos[idx].url;
  document.getElementById('shareCaption').textContent = shareViewPhotos[idx].caption || '';
  document.querySelectorAll('#shareThumbs img').forEach((img, i) => img.classList.toggle('active', i === idx));
}

function shareHeroStep(dir) {
  let next = shareViewIndex + dir;
  if (next < 0) next = shareViewPhotos.length - 1;
  if (next >= shareViewPhotos.length) next = 0;
  setShareHero(next);
}

// ============ MODAL UTIL ============
function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  if (overlay) overlay.remove();
}
